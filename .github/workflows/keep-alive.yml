name: Keep Render Alive

on:
  schedule:
    # Run every 0.8 minutes
    - cron: '*/0.8 * * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Server
        run: |
          # The URL is now stored safely in GitHub Secrets
          curl -s "https://tilder-services.onrender.com/api/auth/status" || echo "Server is waking up..."
