name: Keep Render Alive

on:
  schedule:
    # Run every 5 minutes
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Server
        run: |
          # The URL is now stored safely in GitHub Secrets
          curl -s "${{ secrets.TILDER_SERVICE_URL }}/api/auth/status" || echo "Server is waking up..."
