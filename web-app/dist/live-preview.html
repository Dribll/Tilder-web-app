<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tilder Live Preview</title>
    <style>
      :root {
        color-scheme: dark;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        background: #070b14;
        color: #dbe4ff;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        display: flex;
        flex-direction: column;
      }

      .preview-shell {
        display: flex;
        flex-direction: column;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle at top, rgba(93, 87, 160, 0.16), transparent 48%), #070b14;
      }

      .preview-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 12px 16px;
        border-bottom: 1px solid rgba(132, 145, 203, 0.2);
        background: rgba(10, 14, 26, 0.92);
      }

      .preview-title {
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.02em;
      }

      .preview-meta {
        font-size: 12px;
        color: #92a0c8;
      }

      .preview-actions {
        display: flex;
        gap: 8px;
      }

      .preview-btn {
        border: 1px solid rgba(132, 145, 203, 0.26);
        background: rgba(22, 28, 48, 0.92);
        color: #e9edff;
        border-radius: 10px;
        padding: 8px 12px;
        font-size: 12px;
        cursor: pointer;
      }

      .preview-btn:hover {
        border-color: rgba(127, 136, 255, 0.52);
        background: rgba(33, 41, 68, 0.96);
      }

      .preview-body {
        position: relative;
        flex: 1;
        min-height: 0;
      }

      .preview-frame {
        width: 100%;
        height: 100%;
        border: 0;
        background: #ffffff;
      }

      .preview-empty {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        color: #8c98bf;
        font-size: 14px;
        letter-spacing: 0.02em;
      }
    </style>
  </head>
  <body>
    <div class="preview-shell">
      <div class="preview-bar">
        <div>
          <div class="preview-title">Live Preview</div>
          <div class="preview-meta" id="preview-meta">Waiting for HTML from Tilder...</div>
        </div>
        <div class="preview-actions">
          <button class="preview-btn" id="reload-btn" type="button">Reload</button>
        </div>
      </div>
      <div class="preview-body">
        <iframe id="preview-frame" class="preview-frame" title="Tilder Live Preview" sandbox="allow-scripts allow-same-origin"></iframe>
        <div class="preview-empty" id="preview-empty">Open an HTML file and press Run to stream it here.</div>
      </div>
    </div>
    <script src="/live-preview.js"></script>
  </body>
</html>
